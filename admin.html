<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Panel - Rakhi Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 700px;
            margin: 0 auto;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08);
            margin-bottom: 30px;
        }
        h1 {
            font-size: 2rem;
            color: #1a1a1a;
            margin-bottom: 10px;
        }
        .subtitle {
            color: #6c757d;
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            color: #374151;
            margin-bottom: 6px;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: #e11d48;
        }
        .form-group input[type="file"] {
            padding: 8px;
            border: 2px dashed #d1d5db;
            cursor: pointer;
        }
        .form-group input[type="file"]:hover {
            border-color: #e11d48;
        }
        .btn {
            width: 100%;
            padding: 14px;
            background: #e11d48;
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }
        .btn:hover {
            background: #be123c;
        }
        .btn:active {
            transform: scale(0.98);
        }
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .btn-secondary {
            background: #6b7280;
            margin-top: 10px;
        }
        .btn-secondary:hover {
            background: #4b5563;
        }
        .status {
            margin-top: 15px;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 0.95rem;
            display: none;
        }
        .status.show {
            display: block;
        }
        .status.success {
            background: #dcfce7;
            color: #166534;
            border: 1px solid #86efac;
        }
        .status.error {
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fca5a5;
        }
        .status.loading {
            background: #dbeafe;
            color: #1e40af;
            border: 1px solid #93c5fd;
        }
        .products-list {
            margin-top: 30px;
        }
        .product-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 8px;
            border-left: 4px solid #e11d48;
        }
        .product-item .info {
            flex: 1;
        }
        .product-item .info strong {
            display: block;
        }
        .product-item .info small {
            color: #6c757d;
        }
        .product-item .delete-btn {
            background: #ef4444;
            color: white;
            border: none;
            padding: 6px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.2s;
        }
        .product-item .delete-btn:hover {
            background: #dc2626;
        }
        .nav-links {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }
        .nav-links a {
            color: #6b7280;
            text-decoration: none;
            font-weight: 500;
        }
        .nav-links a:hover {
            color: #e11d48;
        }
        .image-preview {
            margin-top: 10px;
            max-width: 200px;
            border-radius: 8px;
            display: none;
        }
        .image-preview.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="nav-links">
                <a href="index.html">🏠 Store</a>
                <a href="admin.html" style="color:#e11d48;">⚙️ Admin</a>
            </div>

            <h1>⚙️ Admin Panel</h1>
            <p class="subtitle">Add or manage products using IBB image hosting</p>

            <form id="productForm">
                <div class="form-group">
                    <label>Product Name *</label>
                    <input type="text" id="productName" placeholder="e.g. Premium Rakhi" required />
                </div>

                <div class="form-group">
                    <label>Price (₹) *</label>
                    <input type="number" id="productPrice" placeholder="e.g. 499" required />
                </div>

                <div class="form-group">
                    <label>Category</label>
                    <select id="productCategory">
                        <option value="Rakhi">Rakhi</option>
                        <option value="Gift">Gift</option>
                        <option value="Combo">Combo</option>
                        <option value="Premium">Premium</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Product Image (Upload to IBB)</label>
                    <input type="file" id="productImage" accept="image/*" />
                    <img id="imagePreview" class="image-preview" alt="Preview" />
                </div>

                <button type="submit" class="btn" id="submitBtn">➕ Add Product</button>
            </form>

            <div class="status" id="statusMsg"></div>
        </div>

        <div class="card">
            <h2 style="font-size:1.3rem; margin-bottom:15px;">📋 Current Products</h2>
            <div id="productsList">
                <p style="color:#6c757d;">Loading products...</p>
            </div>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const GITHUB_TOKEN = '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';
        const REPO_OWNER = 'admin8591-dot';
        const REPO_NAME = 'rakhi-admin';
        const FILE_PATH = 'products.json';
        const BRANCH = 'main';

        // IBB API Key (free - sign up at ibb.co)
        const IBB_API_KEY = '22734d633af8e6f25559a4a527f89fbb'; // Get from https://api.imgbb.com/

        // ==================== DOM REFS ====================
        const form = document.getElementById('productForm');
        const productName = document.getElementById('productName');
        const productPrice = document.getElementById('productPrice');
        const productCategory = document.getElementById('productCategory');
        const productImage = document.getElementById('productImage');
        const imagePreview = document.getElementById('imagePreview');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const productsList = document.getElementById('productsList');

        // ==================== IBB IMAGE UPLOAD ====================
        async function uploadToIBB(file) {
            if (!IBB_API_KEY || IBB_API_KEY === 'YOUR_IBB_API_KEY') {
                // Fallback: Use placeholder if no IBB key
                console.warn('No IBB API key - using placeholder');
                return 'https://via.placeholder.com/400x400/e11d48/ffffff?text=Product';
            }

            const formData = new FormData();
            formData.append('image', file);
            formData.append('key', IBB_API_KEY);

            try {
                const response = await fetch('https://api.imgbb.com/1/upload', {
                    method: 'POST',
                    body: formData,
                });

                if (!response.ok) throw new Error('IBB upload failed');
                
                const data = await response.json();
                if (data.success) {
                    return data.data.url;
                } else {
                    throw new Error(data.error?.message || 'IBB upload error');
                }
            } catch (error) {
                console.error('IBB upload error:', error);
                // Return placeholder on error
                return 'https://via.placeholder.com/400x400/e11d48/ffffff?text=Image+Error';
            }
        }

        // ==================== GITHUB API HELPERS ====================
        async function getProducts() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            try {
                const response = await fetch(url, {
                    headers: {
                        Authorization: `token ${GITHUB_TOKEN}`,
                        Accept: 'application/vnd.github.v3+json',
                    },
                });

                if (response.status === 404) {
                    return { products: [], sha: null };
                }

                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const content = JSON.parse(atob(data.content));
                return {
                    products: Array.isArray(content) ? content : [],
                    sha: data.sha,
                };
            } catch (error) {
                console.error('Get products error:', error);
                return { products: [], sha: null };
            }
        }

        async function saveProducts(products, sha) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 2))));
            
            const payload = {
                message: `Update products - ${new Date().toISOString()}`,
                content: content,
                branch: BRANCH,
            };

            if (sha) {
                payload.sha = sha;
            }

            const response = await fetch(url, {
                method: 'PUT',
                headers: {
                    Authorization: `token ${GITHUB_TOKEN}`,
                    Accept: 'application/vnd.github.v3+json',
                },
                body: JSON.stringify(payload),
            });

            if (!response.ok) throw new Error(`GitHub save failed: ${response.status}`);
            return await response.json();
        }

        // ==================== RENDER PRODUCTS LIST ====================
        async function renderProductsList() {
            try {
                const { products } = await getProducts();
                
                if (!products || products.length === 0) {
                    productsList.innerHTML = '<p style="color:#6c757d;">No products added yet.</p>';
                    return;
                }

                productsList.innerHTML = products.map((product, index) => `
                    <div class="product-item">
                        <div class="info">
                            <strong>${product.name || 'Unnamed'}</strong>
                            <small>₹${product.price || '0'} • ${product.category || 'General'}</small>
                        </div>
                        <button class="delete-btn" data-index="${index}">✕</button>
                    </div>
                `).join('');

                // Delete handlers
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', async function() {
                        const index = parseInt(this.dataset.index);
                        await deleteProduct(index);
                    });
                });
            } catch (error) {
                console.error('Render error:', error);
                productsList.innerHTML = '<p style="color:#ef4444;">Error loading products</p>';
            }
        }

        // ==================== DELETE PRODUCT ====================
        async function deleteProduct(index) {
            if (!confirm('Delete this product?')) return;

            try {
                const { products, sha } = await getProducts();
                if (!products || index >= products.length) return;

                products.splice(index, 1);
                await saveProducts(products, sha);
                await renderProductsList();
                showStatus('Product deleted successfully', 'success');
            } catch (error) {
                showStatus(`Error: ${error.message}`, 'error');
            }
        }

        // ==================== FORM SUBMIT ====================
        form.addEventListener('submit', async function(e) {
            e.preventDefault();

            const name = productName.value.trim();
            const price = productPrice.value.trim();
            const category = productCategory.value;
            const file = productImage.files[0];

            if (!name || !price) {
                showStatus('Please fill in Name and Price', 'error');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '⏳ Saving...';
            showStatus('Uploading image...', 'loading');

            try {
                // 1. Upload image to IBB
                let imageUrl = 'https://via.placeholder.com/400x400/e11d48/ffffff?text=Product';
                if (file) {
                    imageUrl = await uploadToIBB(file);
                }

                // 2. Get current products
                const { products, sha } = await getProducts();

                // 3. Add new product
                const newProduct = {
                    id: Date.now(),
                    name: name,
                    price: parseFloat(price),
                    category: category,
                    image: imageUrl,
                    createdAt: new Date().toISOString(),
                };

                products.push(newProduct);

                // 4. Save to GitHub
                await saveProducts(products, sha);

                // 5. Refresh UI
                await renderProductsList();
                form.reset();
                imagePreview.classList.remove('show');
                imagePreview.src = '';
                
                showStatus('✅ Product added successfully!', 'success');
            } catch (error) {
                console.error('Submit error:', error);
                showStatus(`❌ Error: ${error.message}`, 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '➕ Add Product';
            }
        });

        // ==================== IMAGE PREVIEW ====================
        productImage.addEventListener('change', function() {
            const file = this.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    imagePreview.src = e.target.result;
                    imagePreview.classList.add('show');
                };
                reader.readAsDataURL(file);
            } else {
                imagePreview.classList.remove('show');
            }
        });

        // ==================== STATUS HELPER ====================
        function showStatus(message, type) {
            statusMsg.textContent = message;
            statusMsg.className = `status show ${type}`;
            
            if (type === 'success' || type === 'error') {
                setTimeout(() => {
                    statusMsg.className = 'status';
                }, 5000);
            }
        }

        // ==================== INIT ====================
        renderProductsList();
    </script>
</body>
</html>
