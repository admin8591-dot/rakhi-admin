<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rakhi Store</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background: #f8f9fa;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h1 {
            text-align: center;
            color: #1a1a1a;
            font-size: 2.5rem;
            margin: 30px 0;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 10px;
        }
        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
        }
        .product-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
            background: #f0f0f0;
        }
        .product-info {
            padding: 20px;
        }
        .product-info h3 {
            font-size: 1.2rem;
            color: #1a1a1a;
            margin-bottom: 8px;
        }
        .product-info .price {
            font-size: 1.5rem;
            font-weight: 700;
            color: #e11d48;
        }
        .product-info .price::before {
            content: '₹ ';
        }
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 1.2rem;
        }
        .no-products {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
            font-size: 1.2rem;
        }
        .admin-link {
            text-align: center;
            margin: 30px 0;
        }
        .admin-link a {
            display: inline-block;
            background: #1a1a1a;
            color: white;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            transition: background 0.3s;
        }
        .admin-link a:hover {
            background: #333;
        }
        .badge {
            display: inline-block;
            background: #e11d48;
            color: white;
            padding: 2px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎀 Rakhi Store</h1>
        <div id="productsContainer">
            <div class="loading">Loading products...</div>
        </div>
        <div class="admin-link">
            <a href="admin.html">📦 Admin Panel</a>
        </div>
    </div>

    <script>
        // ==================== CONFIG ====================
        const REPO_OWNER = 'admin8591-dot';
        const REPO_NAME = 'rakhi-admin';
        const FILE_PATH = 'products.json';
        const BRANCH = 'main';

        // ==================== FETCH PRODUCTS ====================
        async function fetchProducts() {
            try {
                const url = `https://raw.githubusercontent.com/${REPO_OWNER}/${REPO_NAME}/${BRANCH}/${FILE_PATH}`;
                const response = await fetch(url);
                
                if (!response.ok) {
                    if (response.status === 404) {
                        return [];
                    }
                    throw new Error(`HTTP ${response.status}`);
                }
                
                const data = await response.json();
                return Array.isArray(data) ? data : [];
            } catch (error) {
                console.error('Fetch error:', error);
                return [];
            }
        }

        // ==================== RENDER PRODUCTS ====================
        function renderProducts(products) {
            const container = document.getElementById('productsContainer');
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="no-products">
                        <p>🛍️ No products available yet</p>
                        <p style="font-size:0.9rem; margin-top:10px;">Add products from the admin panel</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = `
                <div class="products-grid">
                    ${products.map(product => `
                        <div class="product-card">
                            <img src="${product.image || 'https://via.placeholder.com/300x260/eee/999?text=No+Image'}" 
                                 alt="${product.name || 'Product'}"
                                 onerror="this.src='https://via.placeholder.com/300x260/eee/999?text=Image+Error'"
                            />
                            <div class="product-info">
                                <h3>${product.name || 'Unnamed Product'}</h3>
                                <div class="price">${product.price || '0'}</div>
                                ${product.category ? `<div class="badge">${product.category}</div>` : ''}
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        // ==================== INIT ====================
        async function init() {
            const products = await fetchProducts();
            renderProducts(products);
        }

        init();
    </script>
</body>
</html>
